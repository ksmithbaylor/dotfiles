[terminal]
# tmux used: set -g default-shell /opt/homebrew/bin/zsh
default_shell = "/opt/homebrew/bin/zsh"
# "auto" => login shell on macOS, matching Alacritty's `args = ["--login"]`
shell_mode = "auto"
# tmux opened new panes/windows in the current pane's dir (-c "#{pane_current_path}")
new_cwd = "follow"

[keys]
# tmux: unbind C-b; set -g prefix 'C-\'
prefix = "ctrl+\\"

# --- Splits: match tmux (% = left/right, " = top/bottom) ---
split_vertical   = "prefix+%"
split_horizontal = "prefix+\""

# --- Directional pane focus: vim keys (already herdr's defaults, set explicitly) ---
focus_pane_left  = "prefix+h"
focus_pane_down  = "prefix+j"
focus_pane_up    = "prefix+k"
focus_pane_right = "prefix+l"

# --- Rotate pane focus: tmux prefix+o ---
cycle_pane_next = "prefix+o"

# Unbind close-pane (default prefix+x): too easy to hit by accident and lose a
# running process. Close via the mouse/context menu or by exiting the shell.
close_pane = ""

# herdr plugin install dantehemerson/herdr-last-tab
[[keys.command]]
key = "alt+\\"
type = "plugin_action"
command = "dantehemerson.last-tab.toggle"
description = "toggle last-used tab"

# Open new tabs in the focused pane's current directory (like tmux's
# `-c "#{pane_current_path}"`). herdr's built-in new_tab uses the workspace's
# origin dir and ignores where the pane has cd'd, so we shell out and pass the
# focused pane's live cwd explicitly. This overrides the default new_tab on
# prefix+c; the `:+` guard falls back to a plain new tab if the cwd is unset.
[[keys.command]]
key = "prefix+c"
type = "shell"
command = 'herdr tab create --focus ${HERDR_ACTIVE_PANE_CWD:+--cwd "$HERDR_ACTIVE_PANE_CWD"}'
description = "new tab in current dir"

# Break the focused pane out into a new tab (like tmux's `prefix + !`).
# herdr has no built-in break_pane action, so shell out to the CLI and pass
# the focused pane's id. `pane move --new-tab` creates a fresh tab and
# relocates the pane; --focus follows it, matching tmux's break-pane.
[[keys.command]]
key = "prefix+!"
type = "shell"
command = 'herdr pane move "$HERDR_ACTIVE_PANE_ID" --new-tab --focus'
description = "break pane into new tab"

# Join-pane, tmux-style. herdr has no native "marked pane", so we stash the
# target tab id in a temp file with prefix+m, then prefix+shift+m moves the
# focused pane into that marked tab (as a right split). Change --split right to
# --split down for a top/bottom join.
[[keys.command]]
key = "prefix+m"
type = "shell"
command = 'printf %s "$HERDR_ACTIVE_TAB_ID" > "${TMPDIR:-/tmp}/herdr-marked-tab"'
description = "mark current tab as join target"

[[keys.command]]
key = "prefix+shift+m"
type = "shell"
command = 'herdr pane move "$HERDR_ACTIVE_PANE_ID" --tab "$(cat "${TMPDIR:-/tmp}/herdr-marked-tab" 2>/dev/null)" --split right --focus'
description = "move focused pane into marked tab"

[ui]
pane_borders = true
pane_gaps = false
agent_panel_sort = "spaces"
show_agent_labels_on_pane_borders = true

[ui.toast]
delivery = "herdr"

[theme]
name = "one-dark"
auto_switch = false

# Override individual color tokens on top of one-dark. Inactive tab labels are
# drawn as fg=overlay0 on bg=surface0 (see herdr src/ui/tabs.rs), so brightening
# overlay0 makes them more legible against the tab bar. Valid token names are
# Catppuccin-style (overlay0/overlay1/surface0/subtext0/…), NOT "overlay". Tune
# the value to taste; `herdr server reload-config` previews live.
[theme.custom]
overlay0 = "#8f97a3"

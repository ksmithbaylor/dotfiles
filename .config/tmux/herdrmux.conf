# Minimal tmux whose ONLY job is to host herdr full-screen and paint a status
# bar on the bottom row (herdr has no status line of its own).
#
# Always launched isolated, via bin/herdrmux:
#   tmux -L herdrmux -f ~/.config/tmux/herdrmux.conf ...
# The dedicated socket (-L herdrmux) + this config keep it fully separate from
# your real ~/.tmux.conf and any normal tmux server.
#
# Prefix is left at the default C-b (unused) so it never collides with herdr's C-\.

# --- truecolor + snappy, transparent input passthrough to the inner herdr ---
set -g  default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"       # 24-bit color through to herdr
# Disabled for now: with herdr in the inner PTY, extkeys appears to cause
# pasted newlines to be forwarded as modified key sequences instead of raw LF.
# Re-enable if herdr/tmux paste handling is fixed upstream.
# set -as terminal-features ",*:extkeys"   # advertise extended-keys support
# set -s  extended-keys on                 # forward enhanced key events to herdr
set -s  escape-time 0                    # no ESC delay for herdr / nvim inside
set -g  mouse off                        # let herdr own the mouse

# --- status bar (shared with ~/.tmux.conf via ~/bin/tmux-statusline) ---
set -g status on
set -g status-interval 5
set -g status-bg colour236
set -g status-fg colour246

# Only ever one window (herdr), so drop the window list and left segment.
set -g status-left ""
set -g window-status-format ""
set -g window-status-current-format ""

set -g status-right-length 1000          # effectively unlimited; terminal width is the real cap
set -g status-right "#(~/bin/tmux-statusline)"
